<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog Code Request Portal</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; margin: 0; }
        .form-container { max-width: 750px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin: 20px auto; }
        h2 { text-align: center; color: #0056b3; margin-bottom: 25px; font-size: 24px; border-bottom: 2px solid #f4f7f6; padding-bottom: 15px; margin-top: 0; }
        h3 { font-size: 14px; color: #0056b3; border-bottom: 1px solid #ddd; padding-bottom: 5px; margin-top: 25px; margin-bottom: 15px; }
        .row { display: flex; gap: 15px; margin-bottom: 5px; }
        .col { flex: 1; }
        label { font-weight: bold; display: block; margin-top: 12px; margin-bottom: 5px; font-size: 13px; color: #555; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; background-color: #fff; }
        input[readonly] { background-color: #e9ecef; color: #495057; cursor: not-allowed; border: 1px solid #ced4da; }
        .char-count { font-size: 11px; color: #666; text-align: right; margin-top: -10px; margin-bottom: 10px; }
        button { width: 100%; padding: 14px; background-color: #0056b3; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 20px; transition: background 0.2s; }
        button:hover { background-color: #004085; }
        .status-msg { margin-top: 15px; padding: 12px; border-radius: 4px; display: none; font-weight: bold; text-align: center; font-size: 14px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>📋 New Catalog Item Request Portal</h2>
    <form id="requestForm">
        
        <!-- 1. PDF Quotation Upload -->
        <label for="pdfUpload"><strong>📂 Upload Quotation (PDF Only):</strong></label>
        <input type="file" id="pdfUpload" accept=".pdf" required>

        <h3>🏢 Partner Profile & Auto-Generated Codes</h3>

        <!-- Partner Search Input Box -->
        <label for="partnerSearch">Partner Name:</label>
        <input type="text" id="partnerSearch" list="partnerList" placeholder="Type or click to select a partner..." required autocomplete="off">
        <datalist id="partnerList">
            <!-- Dropdown Options will populate dynamically below -->
            <option value="PEOPLELOGY DEVELOPMENT SDN BHD-EXP1">
            <option value="PEOPLELOGY GOAL SDN BHD">
            <option value="PERCETAKAN RONSON SDN BHD-EXP1">
            <option value="PIZZA HUT RESTAURANTS SDN BHD-EXP1">
        </datalist>

        <!-- Auto-Fetched Fields Row -->
        <div class="row">
            <div class="col">
                <label for="partnerCode">Partner Code (Auto):</label>
                <input type="text" id="partnerCode" readonly placeholder="Auto-fills from matrix">
            </div>
            <div class="col">
                <label for="buyerCode">Buyer Code (Auto):</label>
                <input type="text" id="buyerCode" readonly placeholder="Auto-fills from matrix">
            </div>
            <div class="col">
                <label for="currency">Currency (Auto):</label>
                <input type="text" id="currency" readonly placeholder="Auto-fills from matrix">
            </div>
        </div>

        <h3>📝 Catalog Item Details</h3>

        <!-- Category Dropdown Selection -->
        <label for="category">Category Type:</label>
        <select id="category" required>
            <option value="">-- PLEASE SELECT --</option>
            <option value="Controllable">Controllable</option>
            <option value="Comparison">Comparison</option>
            <option value="Chemical">Chemical</option>
            <option value="Non-Controllable">Non-Controllable</option>
        </select>

        <!-- Item Description (46 Max Length & Capital Lock) -->
        <label for="description">Item Description (Max 46 Characters, UPPERCASE Only):</label>
        <input type="text" id="description" maxlength="46" placeholder="ENTER ITEM DESCRIPTION HERE" required>
        <div class="char-count"><span id="charNum">0</span> / 46 characters</div>

        <!-- UOM and Validity Dates -->
        <div class="row">
            <div class="col">
                <label for="uom">Purchase UOM:</label>
                <select id="uom" required>
                    <option value="">-- PLEASE SELECT --</option>
                    <option value="BT">BT</option><option value="BUL">BUL</option><option value="BX">BX</option>
                    <option value="CT">CT</option><option value="DAY">DAY</option><option value="DRM">DRM</option>
                    <option value="GRM">GRM</option><option value="HR">HR</option><option value="JOB">JOB</option>
                    <option value="KGM">KGM</option><option value="LOT">LOT</option><option value="LTR">LTR</option>
                    <option value="M3">M3</option><option value="MAN">MAN</option><option value="MLT">MLT</option>
                    <option value="MM">MM</option><option value="MTH">MTH</option><option value="NRL">NRL</option>
                    <option value="PCE">PCE</option><option value="PKT">PKT</option><option value="PR">PR</option>
                    <option value="PT">PT</option><option value="SET">SET</option><option value="SHT">SHT</option>
                    <option value="TON">TON</option><option value="TRP">TRP</option><option value="UT">UT</option>
                </select>
            </div>
            <div class="col">
                <label for="validityDate">End of Validity Date:</label>
                <input type="date" id="validityDate" required>
            </div>
        </div>

        <!-- Prices Rows -->
        <div class="row">
            <div class="col">
                <label for="initialPrice">Initial Price:</label>
                <input type="number" id="initialPrice" step="0.01" placeholder="0.00" required>
            </div>
            <div class="col">
                <label for="finalPrice">Final Price:</label>
                <input type="number" id="finalPrice" step="0.01" placeholder="0.00" required>
            </div>
        </div>

        <!-- Logistics Rows -->
        <div class="row">
            <div class="col">
                <label for="moq">MOQ (Min Order Qty):</label>
                <input type="number" id="moq" value="1" min="1" required>
            </div>
            <div class="col">
                <label for="leadTime">Lead Time (Days):</label>
                <input type="number" id="leadTime" placeholder="e.g. 7" min="0" required>
            </div>
            <div class="col">
                <label for="shippingTerm">Shipping Term:</label>
                <select id="shippingTerm" required>
                    <option value="">-- PLEASE SELECT --</option>
                    <option value="CIF">CIF</option><option value="CIP">CIP</option><option value="DAP">DAP</option>
                    <option value="DAT">DAT</option><option value="DDP">DDP</option><option value="DDU">DDU</option>
                    <option value="EXW">EXW</option><option value="FCA">FCA</option><option value="FOB">FOB</option>
                    <option value="OTHERS">OTHERS</option>
                </select>
            </div>
        </div>

        <div id="statusNotification" class="status-msg"></div>
        <button type="submit" id="submitBtn">Submit Request</button>
    </form>
</div>

<script>
    // Config: Paste your Google Apps Script Web App URL here
    const GOOGLE_WEBAPP_URL = "PASTE_YOUR_GOOGLE_WEB_APP_URL_HERE";

    // Matrix Database Lookup: You can paste your thousands of entries directly here!
    const partnerDatabase = {
        "PEOPLELOGY DEVELOPMENT SDN BHD-EXP1": { partnerCode: "PPL-001", buyerCode: "BYR-A", currency: "MYR" },
        "PEOPLELOGY GOAL SDN BHD": { partnerCode: "PPL-002", buyerCode: "BYR-B", currency: "MYR" },
        "PERCETAKAN RONSON SDN BHD-EXP1": { partnerCode: "PRN-055", buyerCode: "BYR-A", currency: "SGD" },
        "PIZZA HUT RESTAURANTS SDN BHD-EXP1": { partnerCode: "PZH-999", buyerCode: "BYR-C", currency: "USD" }
    };

    const partnerSearch = document.getElementById('partnerSearch');
    const descInput = document.getElementById('description');
    const submitBtn = document.getElementById('submitBtn');
    const statusNotification = document.getElementById('statusNotification');

    // Rule: Auto-fetch details when partner name matches database key matrix
    partnerSearch.addEventListener('input', function() {
        const selected = this.value;
        if (partnerDatabase[selected]) {
            document.getElementById('partnerCode').value = partnerDatabase[selected].partnerCode;
            document.getElementById('buyerCode').value = partnerDatabase[selected].buyerCode;
            document.getElementById('currency').value = partnerDatabase[selected].currency;
        } else {
            // Keep empty if typing a name not yet saved in database matrix
            document.getElementById('partnerCode').value = "";
            document.getElementById('buyerCode').value = "";
            document.getElementById('currency').value = "";
        }
    });

    // Rule: Capital letters lock and character counting tracker
    descInput.addEventListener('input', function() {
        this.value = this.value.toUpperCase();
        document.getElementById('charNum').innerText = this.value.length;
    });

    // Rule: Auto Decimal formatting on loss of focus (ex: 19 becomes 19.00)
    function formatDecimal() {
        if(this.value) {
            this.value = parseFloat(this.value).toFixed(2);
        }
    }
    document.getElementById('initialPrice').addEventListener('blur', formatDecimal);
    document.getElementById('finalPrice').addEventListener('blur', formatDecimal);

    // Form Submission: Reads PDF file data and posts package to Google Drive
    document.getElementById('requestForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const fileInput = document.getElementById('pdfUpload');
        const file = fileInput.files[0];
        
        if (!file) {
            alert("Please upload the quotation PDF first!");
            return;
        }

        submitBtn.disabled = true;
        showStatus("Uploading quotation file and logging catalog request details...", "#2980b9");

        // Convert the uploaded PDF into a string format so it can cross the web network safely
        const reader = new FileReader();
        reader.onload = function(e) {
            const base64String = e.target.result.split(',')[1];
            
            const formData = {
                pdfFile: base64String,
                pdfName: file.name,
                partnerName: partnerSearch.value,
                partnerCode: document.getElementById('partnerCode').value || "NEW_PARTNER",
                buyerCode: document.getElementById('buyerCode').value || "UNKNOWN",
                currency: document.getElementById('currency').value || "MYR",
                category: document.getElementById('category').value,
                description: descInput.value,
                uom: document.getElementById('uom').value,
                validityDate: document.getElementById('validityDate').value,
                initialPrice: document.getElementById('initialPrice').value,
                finalPrice: document.getElementById('finalPrice').value,
                moq: document.getElementById('moq').value,
                leadTime: document.getElementById('leadTime').value,
                shippingTerm: document.getElementById('shippingTerm').value
            };

            // Post everything to the Google cloud engine script
            fetch(GOOGLE_WEBAPP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            })
            .then(() => {
                showStatus("🎉 Request Submitted! Your quotation PDF and catalog codes have been saved.", "#2ecc71");
                document.getElementById('requestForm').reset();
                document.getElementById('charNum').innerText = "0";
                submitBtn.disabled = false;
            })
            .catch(err => {
                showStatus("Error uploading request: " + err.message, "#e74c3c");
                submitBtn.disabled = false;
            });
        };
        reader.readAsDataURL(file);
    });

    function showStatus(msg, color) {
        statusNotification.innerText = msg;
        statusNotification.style.backgroundColor = color;
        statusNotification.style.color = "white";
        statusNotification.style.display = "block";
    }
</script>

</body>
</html>
